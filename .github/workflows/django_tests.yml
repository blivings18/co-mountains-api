name: Django CI

# Trigger this workflow on pushes to main, or when a pull request is opened against main
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download the code from the repository onto the GitHub runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up the Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # Matches a standard modern Python setup

      # Step 3: Install all required framework packages
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install django djangorestframework django-filter

      # Step 4: Run the Django test suite
      - name: Run Tests
        run: |
          python manage.py test
